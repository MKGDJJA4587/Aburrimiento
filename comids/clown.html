<!-- El tamaño se controla con width="300" (ajusta los píxeles a tu gusto) -->
<!-- Se eliminó 'muted' para que reproduzca con sonido tras el clic -->
<video id="miVideo" width="300" loop playsinline>
    <source src="../vid/meme payaso foto.mp4" type="video/mp4">
    Tu navegador no soporta este video.
</video>

<script>
  // El video se reproducirá con sonido automáticamente en cuanto el usuario haga un clic en la página
  document.addEventListener('click', () => {
    const video = document.getElementById('miVideo');
    
    // Forzamos el encendido del audio por si el navegador intenta bloquearlo
    video.muted = false; 
    
    video.play().catch(error => {
      console.log("La reproducción fue bloqueada por el navegador:", error);
    });
  }, { once: true });
</script>
